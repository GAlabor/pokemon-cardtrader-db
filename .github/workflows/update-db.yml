name: Update Pokemon DB

on:
  workflow_dispatch:
  schedule:
    # GitHub usa UTC. Evito il minuto :00 perché GitHub dice che è più soggetto a ritardi/drop.
    # Ogni 15 minuti perché il build dura circa 11 minuti: ogni 10 rischia sovrapposizioni.
    - cron: '3,18,33,48 * * * *'

permissions:
  contents: write

concurrency:
  group: update-pokemon-db
  cancel-in-progress: false

jobs:
  update-db:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run DB builder
        run: npm run build:db
        env:
          CARDTRADER_TOKEN: ${{ secrets.CARDTRADER_TOKEN }}

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nessuna modifica da salvare"
            exit 0
          fi
          git commit -m "Auto update Pokemon DB"
          git pull --rebase origin main
          git push origin main
