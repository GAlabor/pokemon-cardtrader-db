name: Test Schedule

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  contents: write

jobs:
  test-schedule:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Write test timestamp
        run: |
          mkdir -p data
          date -u +"%Y-%m-%dT%H:%M:%SZ" > data/test-schedule.txt

      - name: Commit test timestamp
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/test-schedule.txt
          git commit -m "Test scheduled workflow" || exit 0
          git push
